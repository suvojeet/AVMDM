name: Averio MDM — Azure Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_APP: averio-mdm-prod-api
  RESOURCE_GROUP: averio-mdmrg

jobs:
  # ── Build JAR and deploy directly to App Service built-in Java runtime ──────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build JAR (skip tests)
        working-directory: backend
        run: mvn clean package -DskipTests -q

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Service for built-in Java 21 runtime
        run: |
          az webapp config set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.BACKEND_APP }} \
            --java-version "21" \
            --java-container "JAVA" \
            --java-container-version "SE"

      - name: Deploy JAR to App Service
        run: |
          JAR=$(ls backend/target/averio-mdm-*.jar | head -1)
          az webapp deploy \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.BACKEND_APP }} \
            --src-path "$JAR" \
            --type jar

      - name: Wait for health check
        run: |
          echo "Waiting 120s for Spring Boot to start..."
          sleep 120
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://averio-mdm-prod-api.azurewebsites.net/actuator/health 2>/dev/null || echo "000")
            echo "Attempt $i — Health status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 30
          done
          echo "Warning: health check did not return 200 — check App Service logs"
          exit 0
