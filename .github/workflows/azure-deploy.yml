name: Averio MDM — Azure Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: averiomdmprodacr
  BACKEND_APP: averio-mdm-prod-api
  FRONTEND_APP: averio-data-studio
  RESOURCE_GROUP: averio-mdmrg
  IMAGE_NAME: averio-mdm-backend

jobs:
  # ── 1. Build & push backend Docker image ──────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build JAR (skip tests)
        working-directory: backend
        run: mvn clean package -DskipTests -q

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push Docker image
        id: meta
        working-directory: backend
        run: |
          TAG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          LATEST=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker build -f ../infrastructure/docker/Dockerfile.backend -t $TAG -t $LATEST .
          docker push $TAG
          docker push $LATEST
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # ── 2. Deploy backend image to App Service ────────────────────────────────
  # Note: Frontend is deployed by Azure's auto-generated workflow:
  # azure-static-web-apps-mango-hill-0f79a0d0f.yml
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to App Service
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.BACKEND_APP }} \
            --container-image-name ${{ needs.build-backend.outputs.image-tag }}

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.BACKEND_APP }}

      - name: Wait for health check
        run: |
          echo "Waiting 90s for app to start..."
          sleep 90
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://averio-mdm-prod-api.azurewebsites.net/actuator/health 2>/dev/null || echo "000")
            echo "Attempt $i — Health status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 30
          done
          echo "Warning: health check did not return 200 — check App Service logs in Azure portal"
          exit 0
