name: Averio MDM — Azure Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: averiomdmprodacr
  BACKEND_APP: averio-mdm-prod-api
  FRONTEND_APP: averio-data-studio
  RESOURCE_GROUP: averio-mdmrg
  IMAGE_NAME: averio-mdm-backend

jobs:
  # ── 1. Build & push backend Docker image ──────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build JAR (skip tests)
        working-directory: backend
        run: mvn clean package -DskipTests -q

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push Docker image
        id: meta
        working-directory: backend
        run: |
          TAG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          LATEST=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker build -f ../infrastructure/docker/Dockerfile.backend -t $TAG -t $LATEST .
          docker push $TAG
          docker push $LATEST
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # ── 2. Build frontend & deploy to Static Web App ──────────────────────────
  build-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (Azure config)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://averio-mdm-prod-api.azurewebsites.net

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true

  # ── 3. Deploy backend image to App Service ────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to App Service
        run: |
          az webapp config container set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.BACKEND_APP }} \
            --container-image-name ${{ needs.build-backend.outputs.image-tag }}

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.BACKEND_APP }}

      - name: Wait for health check
        run: |
          echo "Waiting 60s for app to start..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://averio-mdm-prod-api.azurewebsites.net/actuator/health || echo "000")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Backend is healthy"
