# Azure Cloud Profile
# Activate by setting App Service Application Setting: SPRING_PROFILES_ACTIVE=azure
# All ${VAR} values below must be set as App Service Application Settings.

spring:

  # ── Temporarily disabled on the B1 plan ───────────────────────────────────────
  # Redis: Azure Cache for Redis has publicNetworkAccess=Disabled and B1 App
  # Service plans cannot do VNet integration, so the cache is unreachable.
  # CacheConfig falls back to an in-memory ConcurrentMapCacheManager.
  # Elasticsearch: the starter is on the classpath but unused by application code;
  # without exclusion it auto-configures against localhost:9200 and fails.
  # Re-enable Redis by removing RedisAutoConfiguration below once the app is on a
  # plan with VNet integration (S1+) or the cache allows public access.
  #
  # Only the connection-level autoconfigurations are excluded. Do NOT add the
  # *RepositoriesAutoConfiguration entries here: excluding those tears down the
  # Spring Data repository infrastructure that SpringDataWebAutoConfiguration
  # needs, and every MVC request then fails with
  # NoClassDefFoundError: DomainClassConverter$ToEntityConverter.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration

  # Azure AD JWT authentication (required in production)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AZURE_AD_JWK_URI:}

# Actuator — expose health probes for Azure App Service
management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    neo4j:
      enabled: true
    # Disabled alongside the autoconfigure excludes above — re-enable with Redis.
    redis:
      enabled: false
    elasticsearch:
      enabled: false

# CORS — override with your Azure Static Web App URL(s)
averio:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://mdm.averiomdm.org}

# Client-facing production logging.
# Shows: app startup, DB connectivity, health checks, and errors only.
# Averio developers can raise detail by setting LOG_LEVEL_APP=DEBUG in App Service settings.
logging:
  level:
    root: WARN
    com.averio.mdm: ${LOG_LEVEL_APP:INFO}
    "[org.springframework.boot]": INFO
    "[org.springframework.data.neo4j]": WARN
    "[org.neo4j.driver]": WARN
    "[com.azure.spring.data.cosmos]": WARN
    "[org.springframework.data.redis]": WARN
    "[org.springframework.security]": WARN
    "[org.springframework.web]": WARN
    "[org.apache.catalina]": WARN
    "[io.netty]": WARN
    "[reactor.netty]": WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{correlationId}] %logger{30} - %msg%n"
