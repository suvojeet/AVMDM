spring:
  application:
    name: averio-mdm
  profiles:
    active: local

  # Neo4j Graph Database
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:averio@MDM2026}

  # Azure Cosmos DB
  cloud:
    azure:
      cosmos:
        endpoint: ${COSMOS_ENDPOINT:https://averio-mdmdb.documents.azure.com:443/}
        key: ${COSMOS_KEY:}
        database: ${COSMOS_DATABASE:averiodb}
        populate-query-metrics: true

  # Redis Cache
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:averio@Redis2026}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10

  # Jackson — ISO 8601 dates platform-wide
  jackson:
    date-format: "yyyy-MM-dd'T'HH:mm:ss"
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Security
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AZURE_AD_JWK_URI:}

  # GraphQL
  graphql:
    graphiql:
      enabled: true
    schema:
      locations: classpath:graphql/**/

# Server
server:
  port: 8080
  compression:
    enabled: true
  forward-headers-strategy: framework

# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    neo4j:
      enabled: true
    redis:
      enabled: true

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    display-request-duration: true
  show-actuator: false

# Averio Platform Config
averio:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,https://mdm.averiomdm.org}

  # Azure OpenAI Configuration (used when ai.agent.provider = AZURE_OPENAI)
  ai:
    enabled: ${AI_ENABLED:false}
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    api-key: ${AZURE_OPENAI_KEY:}
    deployment-name: ${AZURE_OPENAI_DEPLOYMENT:gpt-4}
    embedding-deployment: ${AZURE_OPENAI_EMBEDDING:text-embedding-ada-002}

    # AI Agent Module — separate purchasable add-on
    # Set AI_AGENT_ENABLED=false to fully disable all AI components in the UI
    agent:
      enabled: ${AI_AGENT_ENABLED:true}
      # Provider: ANTHROPIC (default) | AZURE_OPENAI
      provider: ${AI_AGENT_PROVIDER:ANTHROPIC}

  # License Tier — controls which data-domain modules are accessible
  # Values: STANDARD | ADVANCED | FULL   (default: FULL for development)
  license:
    tier: ${AVERIO_LICENSE_TIER:FULL}

  # Claude AI (Anthropic) — AverioAI Chatbot & NLP search
  # Used when ai.agent.provider = ANTHROPIC (default)
  claude:
    enabled: ${CLAUDE_ENABLED:true}
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-6}

  # Azure Blob Storage (party photos)
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
    account-name: ${AZURE_STORAGE_ACCOUNT_NAME:averiomdmstorage}
    container-name: ${AZURE_STORAGE_CONTAINER:party-photos}
    max-photo-size-mb: 5

  # Matching Configuration
  matching:
    auto-link-threshold: 0.95
    review-threshold: 0.75
    auto-reject-threshold: 0.40
    batch-size: 1000
    max-candidates: 200

    # Training mode — controls whether the ML model is trained on steward data only
    # (ML_ONLY) or also augmented with GPT-4-generated labels (AI_AUGMENTED).
    #
    # mode options:
    #   ML   — steward labels only (safe, fully explainable, no OpenAI API calls)
    #   AI   — steward labels + GPT-4 synthetic labels (requires averio.ai.enabled=true)
    #   AUTO — AI if Azure OpenAI is configured, otherwise falls back to ML (default)
    #
    # To switch to pure ML:   set TRAINING_MODE=ML
    # To force AI:            set TRAINING_MODE=AI  (and ensure AI_ENABLED=true)
    training:
      mode: ${TRAINING_MODE:AUTO}
      ai-label-sample-size: ${AI_LABEL_SAMPLE_SIZE:100}
      ai-label-max-ratio: ${AI_LABEL_MAX_RATIO:0.40}
      ai-match-threshold: ${AI_MATCH_THRESHOLD:0.70}
      ai-no-match-threshold: ${AI_NO_MATCH_THRESHOLD:0.30}

  # Survivorship
  survivorship:
    default-strategy: MOST_RECENT
    refresh-on-update: true

  # Timeline
  timeline:
    retention-days: 2555     # 7 years for GDPR
    snapshot-enabled: true

logging:
  level:
    com.averio.mdm: DEBUG
    org.springframework.data.neo4j: INFO
    org.neo4j.driver: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"
