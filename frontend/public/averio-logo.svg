<!-- Averio Quantum Logo SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- A triangle -->
  <polygon points="80,20 20,130 140,130" fill="none" stroke="url(#blueGrad)" stroke-width="12" stroke-linejoin="round"/>
  <!-- Inner triangle cutout -->
  <polygon points="80,65 55,110 105,110" fill="#070b18"/>
  <!-- Q letter -->
  <circle cx="175" cy="75" r="52" fill="none" stroke="url(#purpleGrad)" stroke-width="12"/>
  <line x1="205" y1="105" x2="230" y2="130" stroke="url(#purpleGrad)" stroke-width="12" stroke-linecap="round"/>
  <!-- AVERIO text -->
  <text x="20" y="168" font-family="Space Grotesk, Inter, sans-serif" font-size="32" font-weight="700" letter-spacing="10" fill="white">AVERIO</text>
  <!-- QUANTUM text -->
  <line x1="20" y1="182" x2="65" y2="182" stroke="url(#blueGrad)" stroke-width="1.5"/>
  <text x="75" y="186" font-family="Space Grotesk, Inter, sans-serif" font-size="14" font-weight="500" letter-spacing="6" fill="url(#purpleGrad)">QUANTUM</text>
  <line x1="215" y1="182" x2="255" y2="182" stroke="url(#purpleGrad)" stroke-width="1.5"/>
</svg>
